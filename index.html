<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Papier</title>
  </head>

  <body data-state="welcome">
    <header id="titlebar" data-tauri-drag-region>
      <nav id="tabstrip" class="tabstrip" data-tauri-drag-region></nav>
      <button id="recents-btn" class="tb-icon" title="Fichiers ouverts (récents)" aria-label="Fichiers ouverts">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 3-6.7L3 8" /><path d="M3 3v5h5" /><path d="M12 7v5l3 2" />
        </svg>
      </button>
    </header>

    <aside id="recents-panel" class="recents-panel hidden">
      <div class="recents-head">
        <span>Fichiers ouverts</span>
        <button id="recents-close" class="recents-close" title="Fermer (Esc)">✕</button>
      </div>
      <div id="recents-list" class="recents-list"></div>
    </aside>

    <aside id="outline" class="outline hidden">
      <div class="outline-head">Sommaire</div>
      <nav id="outline-list"></nav>
    </aside>

    <main id="content">
      <div id="frontmatter" class="frontmatter hidden"></div>
      <div id="editor-host"></div>
    </main>

    <section id="welcome" class="welcome">
      <div class="welcome-inner">
        <div class="welcome-logo">📄</div>
        <h1>Papier</h1>
        <p class="welcome-sub">Votre lecteur Markdown. Fini le texte balisé.</p>
        <div class="welcome-actions">
          <button id="welcome-open" class="btn-primary">Ouvrir un fichier&nbsp; <kbd>⌘O</kbd></button>
          <button id="welcome-new" class="btn-ghost">Nouveau document&nbsp; <kbd>⌘N</kbd></button>
          <button id="welcome-sample" class="btn-ghost">Voir un exemple</button>
        </div>
        <div id="welcome-recents" class="welcome-recents"></div>
      </div>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
